<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPM NIWAS Attendance & Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#eef8ff;--ink:#0b2f4a;--muted:#64748b;--card:#fff;--blue:#0b7fc3;--cyan:#08a7c7;--teal:#10a987;--soft:#e6f7ff;--line:#ccecff;--shadow:0 18px 45px rgba(8,105,150,.14)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#e8f8ff,#f8fcff 55%,#effff9);color:var(--ink)}
header{background:linear-gradient(135deg,#075985,#0ea5e9 55%,#14b8a6);color:white;padding:24px 28px;box-shadow:0 8px 30px rgba(2,132,199,.22)}
h1{margin:0;font-size:28px;letter-spacing:-.03em}header p{margin:8px 0 0;color:#e6fbff}.top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:10px 14px;background:white;color:#075985;font-weight:800;text-decoration:none;cursor:pointer}.btn.alt{background:rgba(255,255,255,.16);color:white;border:1px solid rgba(255,255,255,.35)}
main{max-width:1500px;margin:auto;padding:22px}.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}.tab{padding:10px 14px;border:1px solid #bae6fd;background:white;color:#075985;border-radius:999px;font-weight:900;cursor:pointer}.tab.active{background:#0284c7;color:white;border-color:#0284c7}.note{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;padding:12px 14px;border-radius:16px;margin-bottom:15px;display:none}.grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:16px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:18px}.metric{cursor:pointer;transition:.15s}.metric:hover{transform:translateY(-2px);box-shadow:0 22px 55px rgba(8,105,150,.22)}.label{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.07em}.value{font-size:34px;font-weight:950;margin:8px 0}.hint{font-size:13px;color:#0369a1}.section{margin-top:18px}.split{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}.wide{grid-column:1/-1}.tablewrap{overflow:auto;max-height:620px;border:1px solid #dbeafe;border-radius:16px;background:white}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:10px 12px;border-bottom:1px solid #e0f2fe;text-align:left;vertical-align:top}th{position:sticky;top:0;background:#f0f9ff;color:#075985;z-index:1}tr:hover td{background:#f8fdff}a.metriclink{font-weight:900;color:#0369a1;text-decoration:underline;cursor:pointer}.pill{display:inline-block;background:#e0f2fe;color:#075985;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900}.filters{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 12px}input,select{border:1px solid #bae6fd;border-radius:13px;padding:10px;background:white}.modal{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}.modal.open{display:flex}.modalbox{background:white;width:min(1200px,96vw);max-height:88vh;border-radius:24px;box-shadow:0 30px 80px rgba(2,6,23,.35);display:flex;flex-direction:column;overflow:hidden}.modalhead{display:flex;justify-content:space-between;gap:12px;padding:18px;border-bottom:1px solid #e0f2fe}.modalbody{padding:18px;overflow:auto}.x{border:0;background:#e0f2fe;color:#075985;border-radius:12px;padding:8px 12px;font-weight:900;cursor:pointer}.small{font-size:12px;color:var(--muted)}iframe{width:100%;height:680px;border:1px solid #bae6fd;border-radius:18px;background:white}.loader{text-align:center;padding:36px;color:#075985;font-weight:900}@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}.split{grid-template-columns:1fr}}@media(max-width:620px){.grid{grid-template-columns:1fr}h1{font-size:22px}.value{font-size:28px}}
</style>
</head>
<body>
<header><div class="top"><div><h1>SPM NIWAS Attendance & Finance Dashboard</h1><p>Training attendance, program summaries and expenditure with clickable drill-down verification.</p></div><div class="actions"><button class="btn" onclick="loadAll()">Refresh Data</button><a class="btn alt" target="_blank" href="https://docs.google.com/spreadsheets/d/1QBiH1F0IvXaKWKaOkqfDVnHPioQw2BDGH2Ia5CILElg/edit">Training Sheet</a><a class="btn alt" target="_blank" href="https://docs.google.com/spreadsheets/d/1aAgDnovRCH8D8xoZvDB4_41wUJdA1qQjPL4ZkhH2mQA/edit">Finance Sheet</a></div></div></header>
<main><div id="note" class="note"></div><div id="tabs" class="tabs"></div><div id="app"><div class="loader">Loading live Google Sheet data...</div></div></main>
<div id="modal" class="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="modalbox"><div class="modalhead"><div><b id="mt">Details</b><div id="ms" class="small"></div></div><button class="x" onclick="closeModal()">Close</button></div><div id="mb" class="modalbody"></div></div></div>
<script>
const ATT='1QBiH1F0IvXaKWKaOkqfDVnHPioQw2BDGH2Ia5CILElg', FIN='1aAgDnovRCH8D8xoZvDB4_41wUJdA1qQjPL4ZkhH2mQA';
const attendanceTabs=['Dashboard','Physical','Online','Offsite','Certificate course','Webinar','Workshop','Report','Events'];
const financeTabs=['Dashboard','External','Expenditure','Sheet1','Training Expenditure Details'];
const nav=['Training Dashboard','Finance Dashboard','Workshop','Certificate course','Webinar','Events'];
let S={active:nav[0],att:{},fin:{},details:{},charts:[]};
const clean=v=>(v??'').toString().replace(/\s+/g,' ').trim();
const esc=s=>clean(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const num=v=>{let n=parseFloat(clean(v).replace(/[^0-9.-]/g,''));return isNaN(n)?0:n};
const fmt=n=>Math.round(n||0).toLocaleString('en-IN'); const money=n=>'₹ '+fmt(n);
function gidUrl(id,tab){return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`}
async function fetchTab(id,tab){let r=await fetch(gidUrl(id,tab)); if(!r.ok) throw Error(tab); let t=await r.text(); let j=JSON.parse(t.slice(t.indexOf('{'),t.lastIndexOf('}')+1)); let cols=(j.table.cols||[]).map((c,i)=>clean(c.label)||`Column ${i+1}`); return (j.table.rows||[]).map((row,ri)=>{let o={_row:ri+1,_tab:tab}; (row.c||[]).forEach((c,i)=>o[cols[i]]=c?clean(c.f??c.v):''); return o}).filter(o=>Object.keys(o).some(k=>!k.startsWith('_')&&clean(o[k])));}
function findCol(r,terms){let hs=Object.keys(r); for(let term of terms){let h=hs.find(x=>x.toLowerCase().includes(term)); if(h) return h} return ''}
function inferYear(r){let t=Object.values(r).join(' '); let m=t.match(/20\d{2}-\d{2}|20\d{2}/); return m?m[0]:''}
function inferProgram(r){let t=Object.values(r).join(' '); if(/\bJJM\b/i.test(t))return'JJM'; if(/\bSBM\b/i.test(t))return'SBM'; if(/WASH/i.test(t))return'WASH'; return 'Other'}
function inferName(r){return Object.entries(r).filter(([k])=>!k.startsWith('_')).map(([,v])=>clean(v)).find(v=>v.length>10&&!/^\d+$/.test(v))||''}
function normAtt(rows,tab){return rows.map((r,i)=>{let name=findCol(r,['training name','course','workshop','webinar','event','title','name']);let prog=findCol(r,['program','scheme','mission']);let yr=findCol(r,['year','fy']);let typ=findCol(r,['type','mode']);let part=findCol(r,['participant','attended','trained','official','total']);let date=findCol(r,['date']);return {source:tab,row:r._row,program:clean(r[prog])||inferProgram(r),year:clean(r[yr])||inferYear(r),type:clean(r[typ])||tab,name:clean(r[name])||inferName(r),participants:num(r[part]),date:clean(r[date]),raw:r}}).filter(x=>x.name||x.participants||x.program!=='Other')}
function normFin(rows,tab){return rows.map(r=>{let name=findCol(r,['training name','course','workshop','webinar','event','title','name']);let prog=findCol(r,['program']);let typ=findCol(r,['mode','type']);let date=findCol(r,['date']);let total=findCol(r,['total']);let totalVal=total?num(r[total]):Object.entries(r).reduce((a,[k,v])=>/program|name|mode|date|row|tab/i.test(k)?a:a+num(v),0);return {source:tab,row:r._row,program:clean(r[prog])||inferProgram(r),year:inferYear(r),type:clean(r[typ]),name:clean(r[name])||inferName(r),date:clean(r[date]),total:totalVal,raw:r}}).filter(x=>x.name||x.total)}
function allAtt(){return Object.entries(S.att).flatMap(([t,r])=>t==='Dashboard'?[]:normAtt(r,t))}
function allFin(){return Object.entries(S.fin).flatMap(([t,r])=>t==='Dashboard'?[]:normFin(r,t))}
function store(title,rows){let id='d'+Object.keys(S.details).length; S.details[id]={title,rows}; return id}
function link(title,rows,text){let id=store(title,rows); return `<a class="metriclink" onclick="openDetails('${id}')">${text}</a>`}
function metric(label,value,rows,hint){let id=store(label,rows);return `<div class="card metric" onclick="openDetails('${id}')"><div class="label">${esc(label)}</div><div class="value">${value}</div><div class="hint">${hint||'Click to verify details'}</div></div>`}
function renderTabs(){document.getElementById('tabs').innerHTML=nav.map(t=>`<button class="tab ${S.active===t?'active':''}" onclick="S.active='${t}';render()">${t}</button>`).join('')}
function render(){renderTabs(); S.charts.forEach(c=>c.destroy()); S.charts=[]; let app=document.getElementById('app'); let tr=allAtt(), ex=allFin(); if(S.active==='Training Dashboard') return trainingDashboard(app,tr,ex); if(S.active==='Finance Dashboard') return financeDashboard(app,ex); if(S.active==='Workshop') return category(app,tr,/workshop/i,'Workshop'); if(S.active==='Certificate course') return category(app,tr,/certificate/i,'Certificate course'); if(S.active==='Webinar') return category(app,tr,/webinar/i,'Webinar'); if(S.active==='Events') return category(app,tr,/event|offsite|special|report/i,'Events / Offsite / Special Programmes');}
function trainingDashboard(app,tr,ex){let dash=S.att['Dashboard']||[]; app.innerHTML=`<div class="grid">${metric('Number of training records',fmt(tr.length),tr)}${metric('Participants attended',fmt(sum(tr,'participants')),tr.filter(x=>x.participants))}${metric('Programs / schemes',fmt(group(tr,'program').length),tr)}${metric('Categories / tabs',fmt(group(tr,'source').length),tr)}</div><div class="section split"><div class="card"><h2>Training sheet dashboard</h2><p class="small">This section reproduces the first sheet dashboard data in a cleaner HTML design. Every number is clickable.</p>${rawDashboard(dash,'Training Dashboard')}</div><div class="card"><h2>Training categories</h2><canvas id="c1"></canvas></div><div class="card wide"><h2>Program, Year and Training Type Summary</h2>${summaryTable(tr,ex)}</div></div>`; chart('c1',group(tr,'source'),'bar');}
function financeDashboard(app,ex){let dash=S.fin['Dashboard']||[]; app.innerHTML=`<div class="grid">${metric('Finance records',fmt(ex.length),ex)}${metric('Total expenditure',money(sum(ex,'total')),ex)}${metric('Programs with expenditure',fmt(group(ex,'program').length),ex)}${metric('Training modes',fmt(group(ex,'type').length),ex)}</div><div class="section split"><div class="card"><h2>Finance sheet dashboard</h2><p class="small">This is the dashboard data from the first sheet of the finance file, shown as HTML with clickable figures.</p>${rawDashboard(dash,'Finance Dashboard')}</div><div class="card"><h2>Expenditure by program</h2><canvas id="c2"></canvas></div><div class="card wide"><h2>Detailed expenditure</h2>${dataTable(ex,true)}</div></div>`; chart('c2',group(ex,'program','total'),'doughnut');}
function category(app,tr,regex,title){let rows=tr.filter(x=>regex.test([x.source,x.type,x.name].join(' '))); app.innerHTML=`<div class="grid">${metric(title+' records',fmt(rows.length),rows)}${metric('Participants attended',fmt(sum(rows,'participants')),rows.filter(x=>x.participants))}${metric('Programs covered',fmt(group(rows,'program').length),rows)}${metric('Years covered',fmt(group(rows,'year').length),rows)}</div><div class="section split"><div class="card"><h2>${title} by program</h2><canvas id="cat1"></canvas></div><div class="card"><h2>${title} by year</h2><canvas id="cat2"></canvas></div><div class="card wide"><h2>${title} details</h2>${dataTable(rows,false)}</div></div>`; chart('cat1',group(rows,'program'),'bar'); chart('cat2',group(rows,'year'),'bar');}
function rawDashboard(rows,title){if(!rows.length)return `<div class="small">Dashboard tab could not be read. Please ensure the Google Sheet is public/viewable.</div>`; let out='<div class="tablewrap"><table><tbody>'; rows.slice(0,80).forEach((r,i)=>{let vals=Object.entries(r).filter(([k,v])=>!k.startsWith('_')&&clean(v)); if(!vals.length)return; out+='<tr>'+vals.map(([k,v])=>{let isNum=/^[₹,\d. -]+$/.test(clean(v))&&/[\d]/.test(clean(v)); let rowsFor=isNum?matchingRowsByLabel(title,k,v):[]; return `<td>${isNum?link(title+' | '+k,rowsFor.length?rowsFor:allAtt(),esc(v)):esc(v)}</td>`}).join('')+'</tr>'}); return out+'</tbody></table></div>'}
function matchingRowsByLabel(title,k,v){let a=title.startsWith('Finance')?allFin():allAtt(); let val=clean(v).toLowerCase(); let key=clean(k).toLowerCase(); return a.filter(x=>Object.values(x.raw||{}).join(' ').toLowerCase().includes(val)||Object.values(x).join(' ').toLowerCase().includes(key)).slice(0,500)}
function summaryTable(tr,ex){let keys=[...new Set(tr.map(x=>(x.year||'Not specified')+'|'+(x.program||'Other')+'|'+(x.source||x.type||'Training')))]; let rows=keys.map(k=>{let [y,p,t]=k.split('|'); let a=tr.filter(x=>(x.year||'Not specified')===y&&(x.program||'Other')===p&&(x.source||x.type||'Training')===t); let e=ex.filter(x=>(x.year||'Not specified')===y&&(x.program||'Other')===p); return {year:y,program:p,type:t,count:a.length,participants:sum(a,'participants'),expenditure:sum(e,'total'),_att:a,_ex:e}}).sort((a,b)=>clean(b.year).localeCompare(clean(a.year))||b.count-a.count); return `<div class="tablewrap"><table><thead><tr><th>Year</th><th>Name of program</th><th>Type of training</th><th>No. of trainings</th><th>Participants attended</th><th>Expenditure</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.year)}</td><td><span class="pill">${esc(r.program)}</span></td><td>${esc(r.type)}</td><td>${link('Training records: '+r.year+' '+r.program+' '+r.type,r._att,fmt(r.count))}</td><td>${link('Participant records: '+r.year+' '+r.program+' '+r.type,r._att.filter(x=>x.participants),fmt(r.participants))}</td><td>${link('Expenditure: '+r.year+' '+r.program,r._ex,money(r.expenditure))}</td></tr>`).join('')}</tbody></table></div>`}
function dataTable(rows,finance){let heads=finance?['program','year','type','name','date','total','source','row']:['program','year','type','name','date','participants','source','row']; return `<div class="filters"><input id="q" placeholder="Search table" oninput="filterTable()"><button class="btn" onclick="exportCSV()">Export visible CSV</button></div><div class="tablewrap"><table id="datatable"><thead><tr>${heads.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${heads.map(h=>`<td>${h==='total'?money(r[h]):h==='participants'?fmt(r[h]):esc(r[h])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function group(arr,key,val){let m={}; arr.forEach(x=>{let k=clean(typeof key==='function'?key(x):x[key])||'Not specified'; m[k]=(m[k]||0)+(val?num(x[val]):1)}); return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,12)}
function sum(arr,k){return arr.reduce((a,x)=>a+num(x[k]),0)}
function chart(id,data,type){let el=document.getElementById(id); if(!el)return; S.charts.push(new Chart(el,{type,data:{labels:data.map(x=>x[0]),datasets:[{data:data.map(x=>x[1]),label:'Count'}]},options:{responsive:true,plugins:{legend:{display:type==='doughnut'}}}}))}
function openDetails(id){let d=S.details[id]||{title:'Details',rows:[]}; document.getElementById('mt').textContent=d.title; document.getElementById('ms').textContent=(d.rows||[]).length+' records'; document.getElementById('mb').innerHTML=dataTable((d.rows||[]).map(x=>x.total!==undefined||x.participants!==undefined?x:{program:inferProgram(x),year:inferYear(x),type:x._tab||'',name:inferName(x),date:'',participants:'',source:x._tab,row:x._row,raw:x}), (d.rows||[]).some(x=>x.total!==undefined)); document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function filterTable(){let q=document.getElementById('q')?.value.toLowerCase()||''; document.querySelectorAll('#datatable tbody tr').forEach(tr=>tr.style.display=tr.innerText.toLowerCase().includes(q)?'':'none')}
function exportCSV(){let rows=[...document.querySelectorAll('#datatable tr')].filter(r=>r.style.display!=='none').map(r=>[...r.children].map(c=>'"'+c.innerText.replace(/"/g,'""')+'"').join(',')); let blob=new Blob([rows.join('\n')],{type:'text/csv'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dashboard_details.csv'; a.click()}
async function loadAll(){document.getElementById('app').innerHTML='<div class="loader">Refreshing live data...</div>'; let notes=[]; S.att={}; S.fin={}; S.details={}; for(let t of attendanceTabs){try{S.att[t]=await fetchTab(ATT,t)}catch(e){notes.push('Training tab not accessible: '+t)}} for(let t of financeTabs){try{S.fin[t]=await fetchTab(FIN,t)}catch(e){notes.push('Finance tab not accessible: '+t)}} document.getElementById('note').style.display=notes.length?'block':'none'; document.getElementById('note').innerHTML=notes.join('<br>'); render()}
loadAll();
</script>
</body></html>
